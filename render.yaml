services:
  # ------------------- Backend API -------------------
  - type: web
    name: customer-churn-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && gunicorn api:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11

  # ------------------- Frontend Dashboard -------------------
  - type: web
    name: customer-churn-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd streamlit && streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: API_URL
        value: https://customer-churn-api-xxxx.onrender.com   # ← update this after deployment